name: Draw ZMK keymaps
on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/keymap_drawer.yml"
      - "keymap_drawer.yaml"
      - "config/**"

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          cp keymap_drawer.yaml .keymap_drawer1.yaml
          sed -i '2i \  n_columns: 1' .keymap_drawer1.yaml
          cp keymap_drawer.yaml .keymap_drawer2.yaml
          sed -i '2i \  n_columns: 2' .keymap_drawer2.yaml
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(drawer): auto-create drawer configs"
          file_pattern: ".keymap_drawer1.yaml .keymap_drawer2.yaml"
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@main
    needs:
      - prepare
    permissions:
      contents: write
    with:
      commit_message: "[Draw] ${{ github.event.head_commit.message }}"
      amend_commit: false
      install_branch: "main"
      keymap_patterns: "config/*.keymap"
      json_path: ""
      config_path: ".keymap_drawer1.yaml" # config file, ignored if not exists
      output_folder: "keymap-drawer"
      destination: "both"
      artifact_name: "drawings"
      parse_args: "" # map of extra args to pass to `keymap parse`, e.g. "corne:'-l Def Lwr Rse' cradio:''"
      draw_args: "cygnus:'--dts-layout config/boards/shields/cygnus/cygnus-layouts.dtsi'"
      debug_mode: true
  draw2:
    needs:
      - draw
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@main
    permissions:
      contents: write
    with:
      commit_message: "[Draw] ${{ github.event.head_commit.message }} (2 columns)"
      amend_commit: false
      install_branch: "main"
      keymap_patterns: "config/*.keymap"
      json_path: ""
      config_path: ".keymap_drawer2.yaml" # config file, ignored if not exists
      output_folder: "keymap-drawer2"
      destination: "both"
      artifact_name: "drawings2"
      parse_args: "" # map of extra args to pass to `keymap parse`, e.g. "corne:'-l Def Lwr Rse' cradio:''"
      draw_args: "cygnus:'--dts-layout config/boards/shields/cygnus/cygnus-layouts.dtsi'"
      debug_mode: true
  create_png:
    runs-on: ubuntu-latest
    needs:
      - draw2
    steps:
      - name: Install PNG Image Tools
        run: |
          sudo apt-get install -qq -y imagemagick
          sudo apt-get install -qq -y inkscape
          echo "which convert"
          which convert
          echo "convert --version"
          convert --version
      - uses: actions/checkout@v4
      - run: |
          git config --global user.email "linrongbin16@outlook.com"
          git config --global user.name "linrongbin16"
          git pull
      - name: Generate PNG
        run: |
          # Use 96x5 density for png image
          convert -density 480 ./keymap-drawer/cygnus.svg ./keymap-drawer/cygnus.png
          convert -density 480 ./keymap-drawer2/cygnus.svg ./keymap-drawer2/cygnus.png
          echo "git status"
          git status
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(png): auto-create png image"
          file_pattern: "keymap-drawer/cygnus.png keymap-drawer2/cygnus.png"
